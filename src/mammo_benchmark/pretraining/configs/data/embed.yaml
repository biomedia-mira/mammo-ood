name: embed
csv_file: data/embed_pretrain.csv
data_dir: ${oc.env:EMBED_DATA_DIR,data/EMBED/pngs/1024x768}
mmap_path: ${oc.env:EMBED_MEMMAP_512X384_PRETRAIN,data/embed_processed_512x384_pretrain.npy}
image_size: [512, 384]
batch_size: 128
eval_batch_size: 128
num_workers: 8
pin_memory: true
input_channels: 1
test_percent: 0.0
val_percent: 0.1
num_classes: 4
augmentations:
  resize: [512, 384]
  center_crop: [512, 384]
  horizontal_flip: false
  random_color_jitter: 0.0
  color_jitter_prob: 0.0
