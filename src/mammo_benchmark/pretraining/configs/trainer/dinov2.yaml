defaults:
  - base

epochs: 300
learning_rate: 5.0e-4
min_learning_rate: 1.0e-6
weight_decay: 0.04
clip_grad: 3.0
warmup_epochs: 50
warmup_teacher_temp_epochs: 30
precision: bf16-mixed
checkpoint_metric: val_loss
checkpoint_mode: min
use_lr_scheduler: true
head_n_prototypes: 65536
head_bottleneck_dim: 256
head_nlayers: 3
head_hidden_dim: 2048
teacher_temp: 0.07
warmup_teacher_temp: 0.04
momentum_teacher: 0.992
final_momentum_teacher: 1.0
centering: centering
wd_start: 0.04
wd_end: 0.4
koleo_loss_weight: 0.1
ibot_loss_weight: 1.0
ibot_separate_head: false
ibot_mask_ratio_min_max: [0.1, 0.5]
mask_probability: 0.5
freeze_last_layer_epochs: 1
layerwise_decay: 0.9
patch_embed_lr_mult: 0.2
adamw_beta1: 0.9
adamw_beta2: 0.999
tissue_aware_crop: false
tissue_aware_mask: false
online_probe:
  enabled: true
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
crops:
  global_crops_scale: [0.40, 1.0]
  local_crops_number: 8
  local_crops_scale: [0.15, 0.40]
  local_crops_size: [168, 126]
