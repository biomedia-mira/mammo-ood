defaults:
  - base

# Local DINOv3 wrapper currently uses the classic v1 cosine schedules only.
# The values below are the actual hand-tuned training values used at runtime.
epochs: 300
learning_rate: 1.0e-3
min_learning_rate: 1.0e-6
weight_decay: 0.04
weight_decay_end: 0.4
warmup_epochs: 10
warmup_teacher_temp_epochs: 30
precision: bf16-mixed
checkpoint_metric: val_loss
checkpoint_mode: min

# Teacher / loss
momentum_teacher: 0.992
final_momentum_teacher: 1.0
head_n_prototypes: 65536
head_bottleneck_dim: 256
head_nlayers: 3
head_hidden_dim: 2048
teacher_temp: 0.07
warmup_teacher_temp: 0.04
koleo_loss_weight: 0.1
ibot_loss_weight: 1.0
ibot_mask_ratio_min_max: [0.1, 0.5]
mask_probability: 0.5

# Optimizer / param-group behavior
clip_grad: 3.0
freeze_last_layer_epochs: 1
layerwise_decay: 0.9
patch_embed_lr_mult: 0.2
dino_head_wd_multiplier: 1.0
adamw_beta1: 0.9
adamw_beta2: 0.999
compile: false
cudagraphs: false
checkpointing: false
mask_random_circular_shift: false
share_color_jitter: false
tissue_aware_crop: false
tissue_aware_mask: false
token_heatmap:
  enabled: true
  every_n_epochs: 4
  num_reference_images: 3

# Crop schedule / augmentation geometry
crops:
  global_crops_scale: [0.40, 1.0]
  local_crops_number: 8
  local_crops_scale: [0.15, 0.40]
  local_crops_size: [192, 144]
